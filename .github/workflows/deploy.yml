name: CI/CD Tienda Perritos DuocUC

on:
  push:
    branches:
      - main  # Se activa automáticamente cuando haces push a la rama main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v3

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imagenes a Docker Hub
        run: |
          docker build -t vavila999/tienda-frontend:latest ./frontend
          docker build -t vavila999/tienda-backend:latest ./backend
          docker push vavila999/tienda-frontend:latest
          docker push vavila999/tienda-backend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Descargar codigo del repositorio para despliegue
        uses: actions/checkout@v3

      - name: Copiar archivos de configuracion a la EC2 por SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,db/init.sql"
          target: "/home/ubuntu/tienda-perritos"

      - name: Conectarse a EC2 y Actualizar Contenedores
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/tienda-perritos
            
            # Iniciar sesion en el Docker del EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            
            # Apagar lo viejo usando el comando moderno (sin guion medio)
            docker compose down
            
            # Descargar las imagenes nuevas de Docker Hub
            docker compose pull
            
            # Levantar todo de nuevo
            docker compose up -d